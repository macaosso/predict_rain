name: Deploy Static Rainfall Dashboard to Pages

# Trigger on push to main branch, manual run button
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static website files
        uses: actions/upload-pages-artifact@v3
        with:
          path: './static'  # All website files inside static folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
