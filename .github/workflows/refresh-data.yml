name: Auto Refresh HKO Rainfall Data

# Run daily at UTC 00:00 (adjust cron time as you need)
# Cron syntax: minute hour day month weekday
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger button

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false # Use custom PAT for commit push

      # Setup git identity for auto commit
      - name: Configure Git User
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      # Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Install all dependencies
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pandas numpy scipy requests

      # Run script to download HKO data & export static JSON
      - name: Generate rainfall JSON files
        run: |
          python main.py

      # Check if any data file changed
      - name: Check changed files
        id: changes
        run: |
          git add static/data/
          git status --porcelain > diff.txt
          echo "CHANGES=$(cat diff.txt)" >> $GITHUB_ENV

      # Commit & push if JSON updated
      - name: Push updated rainfall data
        if: env.CHANGES != ''
        uses: ad-m/github-push-action@master
        with:
          branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: "Auto-update rainfall JSON from HKO nowcast API"
