name: Auto Refresh HKO Rainfall Data
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Critical: Give bot write permission to repo
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git User
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pandas numpy scipy requests

      - name: Generate rainfall JSON files
        run: |
          python main.py

      - name: Check changed files
        id: changes
        run: |
          git add static/data/
          git status --porcelain > diff.txt
          echo "CHANGES=$(cat diff.txt)" >> $GITHUB_ENV

      # Native git push (NO third-party action, no invalid message param)
      - name: Push updated rainfall data
        if: env.CHANGES != ''
        run: |
          git add static/data/*.json
          git commit -m "Auto-update rainfall JSON from HKO nowcast API"
          git push origin main
