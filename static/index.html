<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKO Gridded Rainfall Interactive Dashboard</title>
    <!-- Tailwind Dark UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet Core -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Heatmap plugin -->
    <script src="https://cdn.jsdelivr.net/npm/leaflet-heat@0.2.0/leaflet-heat.js"></script>
    <style>
        body { background: #0f1118; color: #e4e7ed; }
        .card { background: #181b26; border: 1px solid #2c313f; border-radius: 0.5rem; }
        .btn-refresh { background: #059669; }
        .btn-refresh:hover { background: #047857; }
        select { background: #232733; color: white; border: 1px solid #373c4a; }
        #rain-map { height: 75vh; width: 100%; border-radius: 0.5rem; }
        /* Leaflet dark overrides */
        .leaflet-control { background: #181b26 !important; color: white !important; }
        .leaflet-control-attribution { background: rgba(24,27,38,0.7) !important; color:#aaa !important; }
        /* Loading spinner */
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-6">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-5">
            <h1 class="text-2xl font-bold text-blue-300">HKO 格点雨量臨近預報互動地圖</h1>
            <p class="text-gray-400">Interactive Dark Dashboard | Zoom & Pan Map</p>
        </header>

        <!-- Control Bar -->
        <div class="card p-4 mb-5 flex flex-wrap gap-4 items-center">
            <button id="refreshBtn" class="btn-refresh px-4 py-2 rounded text-white font-medium flex gap-2 items-center">
                <span>🔄</span> Refresh Data
            </button>
            <div class="flex items-center gap-3">
                <label>Forecast Time:</label>
                <select id="timeSelect" class="px-3 py-2 min-w-[280px] rounded">
                    <option>Loading timestamps...</option>
                </select>
            </div>
            <div id="statusText" class="ml-auto text-gray-300"></div>
        </div>

        <!-- Map Container -->
        <div class="card p-3 relative">
            <div id="loadingOverlay" class="absolute inset-0 bg-black/60 z-[1000] flex justify-center items-center hidden rounded">
                <div class="spinner mr-3"></div>
                <span>Loading rainfall map data...</span>
            </div>
            <div id="rain-map"></div>
        </div>
    </div>

    <script>
        // Global variables
        let map;
        let heatLayer;
        let radarRingLayers = [];
        let stationTextMarkers = [];
        let peakMarkers = [];
        const MACAU_CENTER = [22.1595, 113.5685];
        const MAP_BOUNDS = [[21.5, 113], [22.75, 114.15]];

        // Rainfall color matching original matplotlib palette
        function getTextColor(val) {
            if (val < 1) return "#15438e";
            if (val < 5) return "#2fdbeb";
            if (val < 10) return "#0F9C5D";
            if (val < 20) return "#52ee27";
            if (val < 50) return "#ffdd00";
            if (val < 80) return "#ff0000";
            if (val < 100) return "#4a4747";
            return "#6C074E";
        }

        // Initialize Leaflet Dark Map
        function initMap() {
            map = L.map("rain-map", {
                center: MACAU_CENTER,
                zoom: 9,
                minZoom: 7,
                maxZoom: 12,
                maxBounds: MAP_BOUNDS,
                maxBoundsViscosity: 1.0
            });
            // Dark base tile layer (no bright satellite)
            L.tileLayer("https://cartodb-basemaps-{s}.global.ssl.fastly.net/dark_all/{z}/{x}/{y}.png", {
                attribution: "Dark Base Map © CartoDB"
            }).addTo(map);
            // Macau center white marker
            L.circleMarker(MACAU_CENTER, {radius:5, fillColor:"white", stroke:false}).addTo(map);
        }

        // Clear all dynamic layers before redraw
        function clearAllLayers() {
            if (heatLayer) map.removeLayer(heatLayer);
            radarRingLayers.forEach(l => map.removeLayer(l));
            stationTextMarkers.forEach(m => map.removeLayer(m));
            peakMarkers.forEach(m => map.removeLayer(m));
            radarRingLayers = [];
            stationTextMarkers = [];
            peakMarkers = [];
        }

        // Render all map elements from API JSON data
        function renderMapData(data) {
            clearAllLayers();
            const {grid, peaks, station_labels, radar_rings, macau_center} = data;
            const loadingOverlay = document.getElementById("loadingOverlay");
            loadingOverlay.classList.add("hidden");
            document.getElementById("statusText").textContent = `Current: ${data.time_display}`;

            // 1. Rainfall heatmap layer (match original color gradient)
            heatLayer = L.heatLayer(grid, {
                radius:12,
                blur:10,
                minOpacity:0.4,
                gradient:{
                    0.1:"#15438e",
                    1:"#2fdbeb",
                    5:"#0F9C5D",
                    10:"#52ee27",
                    20:"#ffdd00",
                    50:"#ff0000",
                    80:"#4a4747",
                    100:"#6C074E"
                }
            }).addTo(map);

            // 2. Draw Macau radar dashed rings
            radar_rings.forEach(ring => {
                const poly = L.polygon(ring.points, {
                    color:"#949494",
                    fill:false,
                    dashArray:"3 4",
                    weight:1,
                    opacity:0.5
                }).addTo(map);
                radarRingLayers.push(poly);
                // Ring label text
                const ringCenter = macau_center;
                L.marker([ringCenter[0] - (ring.points[20][0] - ringCenter[0]) - 0.025, ringCenter[1]], {
                    icon: L.divIcon({
                        html: `<span style="color:white;opacity:0.5;font-size:10px">${ring.label}</span>`,
                        className:"",
                        iconSize:[40,12]
                    })
                }).addTo(map);
            });

            // 3. Station rainfall text labels
            station_labels.forEach(([lon, lat, val]) => {
                const txtColor = getTextColor(val);
                const icon = L.divIcon({
                    html: `<span style="color:${txtColor};font-weight:bold;font-size:10px">${val}</span>`,
                    className:"",
                    iconSize:[20,14]
                });
                const marker = L.marker([lat, lon], {icon:icon}).addTo(map);
                stationTextMarkers.push(marker);
            });

            // 4. Rainfall peak red circle + value text
            peaks.forEach(([lon, lat, val]) => {
                // Red dot marker
                const dot = L.circleMarker([lat, lon], {
                    radius:4,
                    fillColor:"#ff2222",
                    stroke:false,
                    zIndexOffset:1000
                }).addTo(map);
                peakMarkers.push(dot);
                // Peak value text
                const txtColor = getTextColor(val);
                const txtIcon = L.divIcon({
                    html: `<span style="color:${txtColor};font-weight:bold;font-size:11px">${val}</span>`,
                    className:"",
                    iconSize:[20,14]
                });
                const txtMarker = L.marker([lat, lon], {icon:txtIcon}).addTo(map);
                peakMarkers.push(txtMarker);
            });
        }

        // Fetch timestamps & fill dropdown
        async function loadTimeOptions() {
            const res = await fetch("/api/timestamps");
            const json = await res.json();
            const select = document.getElementById("timeSelect");
            select.innerHTML = "";
            json.timestamps.forEach(item => {
                const opt = document.createElement("option");
                opt.value = item.raw;
                opt.textContent = item.display;
                select.appendChild(opt);
            });
            // Load first timeslice automatically
            if(json.timestamps.length > 0) loadMapData(json.timestamps[0].raw);
        }

        // Fetch data and trigger render
        async function loadMapData(rawTime) {
            const overlay = document.getElementById("loadingOverlay");
            overlay.classList.remove("hidden");
            document.getElementById("statusText").textContent = "Fetching rainfall data...";
            try {
                const res = await fetch(`/api/mapdata?time=${rawTime}&t=${Date.now()}`);
                const data = await res.json();
                renderMapData(data);
            } catch(err) {
                overlay.classList.add("hidden");
                document.getElementById("statusText").textContent = "Map data load failed";
                console.error(err);
            }
        }

        // Refresh button handler
        async function refreshAll() {
            document.getElementById("statusText").textContent = "Refreshing HKO source data...";
            await fetch("/api/refresh");
            await loadTimeOptions();
        }

        // Bind events
        document.getElementById("refreshBtn").addEventListener("click", refreshAll);
        document.getElementById("timeSelect").addEventListener("change", e => {
            const rawTs = e.target.value;
            loadMapData(rawTs);
        });

        // Page init
        window.onload = async () => {
            initMap();
            await loadTimeOptions();
        }
    </script>
</body>
</html>
